<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>大冒險地圖</title><style>
:root{--night:#090b0d;--panel:#1b1a17;--gold:#e9bd62;--green:#58d28c;--red:#e65e62;--text:#fff5df;--muted:#baaa8a}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:#080808;color:var(--text);font-family:"Microsoft JhengHei",system-ui,sans-serif;overflow-x:hidden}.cover{position:fixed;inset:0;z-index:100;display:grid;place-items:center;background:#050403;cursor:pointer;transition:opacity .8s,visibility .8s}.cover.hide{opacity:0;visibility:hidden;pointer-events:none}.cover img{display:block;width:auto;height:auto;max-width:100%;max-height:100vh;object-fit:contain}.cover-tip{position:absolute;left:50%;bottom:4%;transform:translateX(-50%);padding:9px 18px;border:1px solid #e9bd6270;border-radius:99px;background:#090705b8;color:#ffe0a1;font-weight:800;letter-spacing:.1em;animation:pulse 1.5s infinite}.page{min-height:100vh;display:grid;grid-template-rows:auto 1fr;padding:12px}.topbar{position:relative;z-index:5;display:flex;justify-content:space-between;align-items:center;gap:18px;width:min(1400px,100%);margin:auto;padding:4px 5px 12px}.brand h1{font-size:clamp(22px,3vw,34px);margin:0;color:#f1c86d}.brand p{margin:2px 0;color:#a99d87;font-size:13px}.info{display:flex;align-items:center;gap:9px;padding:7px 9px 7px 14px;border:1px solid #8b7042;border-radius:14px;background:#18140ddd;box-shadow:0 6px 18px #0008}.info b{color:#ffd66f;font-size:19px}.reset{border:1px solid #705c39;border-radius:9px;background:#2a2114;color:#e8d5ae;padding:8px 11px;font-weight:800;cursor:pointer}.map-area{display:grid;place-items:center;min-height:0}.map-frame{position:relative;display:inline-block;line-height:0;max-width:100%;filter:drop-shadow(0 16px 35px #000)}.map-frame>img{display:block;width:auto;height:auto;max-width:100%;max-height:calc(100vh - 100px);object-fit:contain}.hotspot{position:absolute;z-index:2;border:0;background:transparent;cursor:pointer;border-radius:18px;transition:.2s}.hotspot:after{content:"";position:absolute;inset:-6px;border-radius:inherit;opacity:0;background:#fff0a51b;box-shadow:0 0 23px 9px #ffe6a433;transition:.2s}.hotspot:hover:after,.hotspot:focus-visible:after{opacity:1}.hotspot.market{left:14.5%;top:32%;width:20%;height:10%}.hotspot.forest{left:67.4%;top:35%;width:20%;height:10%}.hotspot.valley{left:10.8%;top:85%;width:20%;height:10%}.hotspot.door{left:40.4%;top:69.5%;width:19.5%;height:10%}.stamp{position:absolute;z-index:4;display:none;width:42px;height:42px;place-items:center;border:4px double #eaffdc;border-radius:50%;background:#237a4de8;color:#fff;font-size:25px;font-weight:1000;box-shadow:0 3px 12px #0008;transform:rotate(-10deg);pointer-events:none}.stamp.show{display:grid}.stamp.s1{left:32%;top:29%}.stamp.s2{left:84%;top:32%}.stamp.s3{left:27%;top:82%}.modal{position:fixed;inset:0;z-index:30;display:grid;place-items:center;padding:18px;background:#050403df;backdrop-filter:blur(7px);opacity:0;visibility:hidden;transition:.25s}.modal.open{opacity:1;visibility:visible}.doorbox{position:relative;width:min(760px,100%);padding:30px;background:linear-gradient(#312819,#15110d);border:4px double #96743e;border-radius:24px;box-shadow:0 28px 90px #000}.close{position:absolute;right:14px;top:9px;border:0;background:none;color:#fff;font-size:27px;cursor:pointer}.doorbox h2{text-align:center;margin:0 0 4px;font-size:30px;color:#edc36d}.doorbox>div>p{text-align:center;color:var(--muted);margin:0 0 20px}.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.slot{min-height:115px;display:grid;place-items:center;text-align:center;padding:10px;border:3px dashed #705f45;border-radius:17px;background:#0d0b08;color:#9a8a6e;transition:.2s}.slot b{display:block}.slot.over{border-color:#f3c964;transform:scale(1.03)}.slot.filled{border-style:solid;border-color:var(--green);background:#173a29;color:#9cf4be}.slot.wrong{animation:wrong .25s;border-color:var(--red);box-shadow:0 0 20px #ef5960}.pack{margin-top:18px;padding:15px;border-radius:17px;background:#100d09}.pack h3{margin:0 0 11px;color:var(--muted);font-size:14px}.badges{display:flex;justify-content:center;gap:11px;flex-wrap:wrap;min-height:70px}.cert{touch-action:none;min-width:150px;padding:10px 14px;border:2px solid #8d7132;border-radius:12px;background:linear-gradient(#ffe397,#d3a33b);color:#36270c;font-weight:900;text-align:center;cursor:grab;box-shadow:0 5px 0 #75520f;user-select:none}.cert span{font-size:25px}.cert.used{display:none}.empty{color:#736854;padding:18px}.ghost{position:fixed;z-index:99;pointer-events:none;transform:translate(-50%,-50%) rotate(3deg);opacity:.92}.victory{display:none;text-align:center;padding:30px}.victory.show{display:block}.puzzle.hide{display:none}.trophy{font-size:76px}.victory h2{font-size:38px;margin:4px;color:#f2ca70}.victory strong{color:#ffd66f;font-size:27px}.again{margin-top:18px;border:0;border-radius:99px;background:var(--green);color:#092418;padding:13px 24px;font-weight:900;cursor:pointer}@keyframes pulse{50%{opacity:.55;transform:translateX(-50%) scale(.97)}}@keyframes wrong{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}@media(max-width:720px){.page{padding:7px}.topbar{align-items:flex-start}.brand p{display:none}.info{position:absolute;right:2px;top:0}.info b{font-size:15px}.reset{font-size:11px;padding:6px}.map-frame>img{max-height:calc(100vh - 62px)}.slots{grid-template-columns:1fr}.slot{min-height:78px}.doorbox{max-height:93vh;overflow:auto}.cover-tip{font-size:12px;white-space:nowrap}}</style></head><body>
<div class="cover" id="cover"><img src="cover.png" alt="三印傳說遊戲封面"><div class="cover-tip">點擊任何地方開始冒險</div></div>
<main class="page"><header class="topbar"><div class="brand"><h1>大冒險地圖</h1><p>完成 3 個關卡，拿到 3 個憑證解開大門</p></div><div class="info">持有 <b id="count">0 / 3</b><button class="reset" id="reset">🔄 清除進度</button></div></header><section class="map-area"><div class="map-frame"><img src="map-bg.png" alt="大冒險地圖"><button class="hotspot market" data-link="../示範1_可數不可數/index.html" aria-label="前往量詞迷霧市集"></button><button class="hotspot forest" data-link="../示範2_用動物一樣/index.html" aria-label="前往百獸比喻林"></button><button class="hotspot valley" data-link="../示範3_打怪RPG/index.html" aria-label="前往勇者試煉谷"></button><button class="hotspot door" id="gate" aria-label="開啟三印封印之門"></button><i class="stamp s1" id="s1">✓</i><i class="stamp s2" id="s2">✓</i><i class="stamp s3" id="s3">✓</i></div></section></main>
<div class="modal" id="modal"><div class="doorbox"><button class="close" id="close">×</button><div class="puzzle" id="puzzle"><h2>🚪 三印封印之門</h2><p>將背包裡的憑證拖進對應凹槽</p><div class="slots"><div class="slot" data-cert="cert_dynasty"><div>凹槽一<b>數量</b></div></div><div class="slot" data-cert="cert_idiom"><div>凹槽二<b>動物</b></div></div><div class="slot" data-cert="cert_warrior"><div>凹槽三<b>勇者</b></div></div></div><div class="pack"><h3>🎒 憑證背包</h3><div class="badges" id="badges"></div></div></div><div class="victory" id="victory"><div class="trophy">🏆</div><h2>冒險完成！</h2><p>總冒險時長</p><strong id="duration">00 分 00 秒</strong><br><button class="again" id="again">再次冒險</button></div></div></div>
<script>
const CERTS=[{key:'cert_dynasty',icon:'🔢',name:'數量之印'},{key:'cert_idiom',icon:'🐾',name:'動物之印'},{key:'cert_warrior',icon:'⚔️',name:'勇者之印'}],$=s=>document.querySelector(s);let placed=new Set(),drag=null,ghost=null;if(!localStorage.getItem('adventure_start'))localStorage.setItem('adventure_start',Date.now());function held(k){return ['1','true'].includes(localStorage.getItem(k))}function refresh(){let n=0;CERTS.forEach((c,i)=>{let yes=held(c.key);if(yes)n++;$('#s'+(i+1)).classList.toggle('show',yes)});$('#count').textContent=n+' / 3'}function dismissCover(){sessionStorage.setItem('adventure_cover_seen','1');$('#cover').classList.add('hide')}if(sessionStorage.getItem('adventure_cover_seen'))$('#cover').classList.add('hide');else $('#cover').addEventListener('click',dismissCover,{once:true});document.querySelectorAll('.hotspot[data-link]').forEach(x=>x.onclick=()=>location.href=x.dataset.link);
function openGate(){placed.clear();document.querySelectorAll('.slot').forEach((x,i)=>{x.className='slot';x.innerHTML='<div>凹槽'+['一','二','三'][i]+'<b>'+({cert_dynasty:'數量',cert_idiom:'動物',cert_warrior:'勇者'}[x.dataset.cert])+'</b></div>'});let list=CERTS.filter(c=>held(c.key));$('#badges').innerHTML=list.length?list.map(c=>'<div class="cert" draggable="true" data-cert="'+c.key+'"><span>'+c.icon+'</span><br>'+c.name+'</div>').join(''):'<div class="empty">尚未取得任何憑證，先去挑戰關卡吧！</div>';$('#puzzle').classList.remove('hide');$('#victory').classList.remove('show');bind();$('#modal').classList.add('open')}function bind(){document.querySelectorAll('.cert').forEach(c=>{c.ondragstart=e=>{drag=c;e.dataTransfer.setData('text/plain',c.dataset.cert)};c.addEventListener('pointerdown',touchStart)});document.querySelectorAll('.slot').forEach(s=>{s.ondragover=e=>{e.preventDefault();s.classList.add('over')};s.ondragleave=()=>s.classList.remove('over');s.ondrop=e=>{e.preventDefault();s.classList.remove('over');place(e.dataTransfer.getData('text/plain'),s)}})}function place(key,slot){if(!key||placed.has(key))return;if(slot.dataset.cert===key){placed.add(key);let c=CERTS.find(x=>x.key===key);slot.className='slot filled';slot.innerHTML='<div><span style="font-size:30px">'+c.icon+'</span><b>'+c.name+' ✓</b></div>';document.querySelector('.cert[data-cert="'+key+'"]')?.classList.add('used');if(placed.size===3)setTimeout(win,450)}else{slot.classList.add('wrong');setTimeout(()=>slot.classList.remove('wrong'),260)}}function touchStart(e){if(e.pointerType==='mouse')return;e.preventDefault();drag=e.currentTarget;drag.setPointerCapture(e.pointerId);ghost=drag.cloneNode(true);ghost.classList.add('ghost');document.body.appendChild(ghost);move(e);drag.addEventListener('pointermove',move);drag.addEventListener('pointerup',touchEnd);drag.addEventListener('pointercancel',touchEnd)}function move(e){if(!ghost)return;ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';document.querySelectorAll('.slot').forEach(s=>s.classList.remove('over'));document.elementFromPoint(e.clientX,e.clientY)?.closest('.slot')?.classList.add('over')}function touchEnd(e){let key=drag.dataset.cert;drag.releasePointerCapture?.(e.pointerId);drag.removeEventListener('pointermove',move);drag.removeEventListener('pointerup',touchEnd);ghost?.remove();ghost=null;document.querySelectorAll('.slot').forEach(s=>s.classList.remove('over'));let s=document.elementFromPoint(e.clientX,e.clientY)?.closest('.slot');if(s)place(key,s);drag=null}function win(){$('#puzzle').classList.add('hide');$('#victory').classList.add('show');let sec=Math.max(0,Math.floor((Date.now()-Number(localStorage.getItem('adventure_start')))/1000));$('#duration').textContent=String(Math.floor(sec/60)).padStart(2,'0')+' 分 '+String(sec%60).padStart(2,'0')+' 秒'}function clearProgress(){if(confirm('確定清除三個關卡的進度嗎？')){CERTS.forEach(c=>localStorage.removeItem(c.key));localStorage.setItem('adventure_start',Date.now());refresh()}}$('#gate').onclick=openGate;$('#close').onclick=()=>$('#modal').classList.remove('open');$('#modal').onclick=e=>{if(e.target===$('#modal'))$('#modal').classList.remove('open')};$('#reset').onclick=clearProgress;$('#again').onclick=()=>{localStorage.clear();sessionStorage.clear();location.reload()};refresh();
</script></body></html>
