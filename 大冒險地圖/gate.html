<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>三印封印之門</title><style>
*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:18px;color:#fff4d7;font-family:"Microsoft JhengHei",sans-serif;background:linear-gradient(#07080bdd,#07080be8),url("map-bg.png") center/cover fixed}.box{position:relative;width:min(780px,100%);padding:32px;border:4px double #a47d3b;border-radius:25px;background:linear-gradient(145deg,#302716,#15110c);box-shadow:0 25px 90px #000}.back{position:absolute;right:16px;top:13px;color:#fff;text-decoration:none;font-size:25px}.box h1{text-align:center;color:#f2c968;margin:0 0 5px}.sub{text-align:center;color:#b9a787;margin:0 0 22px}.slots{display:grid;grid-template-columns:repeat(3,1fr);gap:13px}.slot{min-height:120px;display:grid;place-items:center;text-align:center;border:3px dashed #746346;border-radius:17px;background:#090806;color:#a8997e;transition:.2s}.slot b{display:block}.slot.over,.slot.selected{border-color:#f2cd70;box-shadow:0 0 22px #f4cf6544}.slot.good{border-style:solid;border-color:#55d18b;background:#173c2b;color:#a4f5c3}.slot.bad{animation:bad .25s;border-color:#e85b65}.pack{margin-top:18px;padding:17px;border-radius:17px;background:#0d0b08}.pack h2{font-size:15px;color:#c1af8e;margin:0 0 13px}.badges{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;min-height:78px}.cert{touch-action:none;min-width:155px;padding:11px 14px;border:2px solid #90712f;border-radius:13px;background:linear-gradient(#ffe49a,#d4a23a);color:#36270c;text-align:center;font-weight:900;cursor:grab;box-shadow:0 5px #75510e;user-select:none}.cert span{font-size:28px}.cert.chosen{outline:4px solid #fff2a8;transform:translateY(-3px)}.cert.used{display:none}.empty{padding:20px;color:#81755f}.hint{text-align:center;color:#97896f;font-size:12px;margin:13px 0 0}.unlock{position:fixed;inset:0;z-index:20;display:grid;place-items:center;text-align:center;background:radial-gradient(circle,#214f76,#070b18 70%);opacity:0;visibility:hidden;transition:1s}.unlock.show{opacity:1;visibility:visible}.unlock h2{font-size:clamp(38px,8vw,78px);color:#ffe28e;margin:0;text-shadow:0 0 25px #ffd35c}.unlock p{color:#d9e7ff}.unlock a{display:inline-block;margin-top:15px;padding:12px 24px;border-radius:99px;background:#ffe08a;color:#30220b;text-decoration:none;font-weight:900}@keyframes bad{25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}@media(max-width:650px){.slots{grid-template-columns:1fr}.slot{min-height:80px}.box{padding:25px 14px;max-height:95vh;overflow:auto}}</style></head><body>
<main class="box"><a class="back" href="map.html" aria-label="回到地圖">×</a><h1>🚪 三印封印之門</h1><p class="sub">將背包裡的憑證拖進對應凹槽</p><section class="slots"><div class="slot" data-key="cert_dynasty"><div>凹槽一<b>數量</b></div></div><div class="slot" data-key="cert_idiom"><div>凹槽二<b>動物</b></div></div><div class="slot" data-key="cert_warrior"><div>凹槽三<b>勇者</b></div></div></section><section class="pack"><h2>🎒 憑證背包</h2><div class="badges" id="badges"></div><p class="hint">可拖曳憑證，或先點憑證再點凹槽</p></section></main><div class="unlock" id="unlock"><div><h2>三印共鳴</h2><p>門後的星光，正等待最後一筆。</p><a href="ending.html">進入星夜終章 →</a></div></div>
<script>
const CERTS=[{key:'cert_dynasty',icon:'🔢',name:'數量之印'},{key:'cert_idiom',icon:'🐾',name:'動物之印'},{key:'cert_warrior',icon:'⚔️',name:'勇者之印'}];let selected='',placed=new Set(),ghost=null,source=null;if(localStorage.getItem('cert_system_version')!=='2'){CERTS.forEach(c=>localStorage.removeItem(c.key));localStorage.setItem('cert_system_version','2')}function held(k){try{return ['1','true'].includes(localStorage.getItem(k))}catch(e){return false}}function render(){const owned=CERTS.filter(c=>held(c.key)),box=document.getElementById('badges');box.innerHTML=owned.length?owned.map(c=>'<div class="cert" draggable="true" data-key="'+c.key+'"><span>'+c.icon+'</span><br>'+c.name+'</div>').join(''):'<div class="empty">尚未取得憑證，請先完成三個關卡。</div>';document.querySelectorAll('.cert').forEach(c=>{c.ondragstart=e=>e.dataTransfer.setData('text/plain',c.dataset.key);c.onclick=()=>{document.querySelectorAll('.cert').forEach(x=>x.classList.remove('chosen'));selected=c.dataset.key;c.classList.add('chosen')};c.onpointerdown=touchStart});document.querySelectorAll('.slot').forEach(s=>{s.ondragover=e=>{e.preventDefault();s.classList.add('over')};s.ondragleave=()=>s.classList.remove('over');s.ondrop=e=>{e.preventDefault();s.classList.remove('over');place(e.dataTransfer.getData('text/plain'),s)};s.onclick=()=>{if(selected)place(selected,s)}})}function place(key,slot){if(!key||placed.has(key))return;if(key===slot.dataset.key){placed.add(key);const c=CERTS.find(x=>x.key===key);slot.className='slot good';slot.innerHTML='<div><span style="font-size:30px">'+c.icon+'</span><b>'+c.name+' ✓</b></div>';document.querySelector('.cert[data-key="'+key+'"]')?.classList.add('used');selected='';if(placed.size===3)setTimeout(()=>document.getElementById('unlock').classList.add('show'),500)}else{slot.classList.add('bad');setTimeout(()=>slot.classList.remove('bad'),260)}}function touchStart(e){if(e.pointerType==='mouse')return;e.preventDefault();source=e.currentTarget;source.setPointerCapture(e.pointerId);ghost=source.cloneNode(true);ghost.style.cssText='position:fixed;z-index:99;pointer-events:none;transform:translate(-50%,-50%);opacity:.9';document.body.appendChild(ghost);move(e);source.onpointermove=move;source.onpointerup=endTouch;source.onpointercancel=endTouch}function move(e){if(!ghost)return;ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px'}function endTouch(e){const key=source.dataset.key;source.releasePointerCapture?.(e.pointerId);ghost?.remove();ghost=null;const slot=document.elementFromPoint(e.clientX,e.clientY)?.closest('.slot');if(slot)place(key,slot);source=null}render();
</script></body></html>
