<!doctype html>
<html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><title>動物比喻・Animal Similes</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700;900&display=swap" rel="stylesheet">
<style>
:root{--paper:#f3e5c4;--ink:#382d24;--red:#a93228;--wood:#e3c98f;--green:#567b55}*{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:"Noto Serif TC","PMingLiU",serif;background-color:var(--paper);background-image:radial-gradient(#806f5430 .7px,transparent .8px),repeating-linear-gradient(4deg,transparent 0 9px,#fff1 10px,#715a3b0a 11px);background-size:13px 13px,100% 17px;overflow-x:hidden}body:before{content:"";position:fixed;inset:0;pointer-events:none;box-shadow:inset 0 0 110px #76573529}.app{width:min(1060px,calc(100% - 28px));margin:auto;padding:24px 0 38px}header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #8c302b55;padding:0 5px 15px;margin-bottom:22px}.brand small{color:var(--red);font-size:11px;letter-spacing:.2em}.brand h1{font-size:clamp(27px,5vw,43px);margin:2px 0;letter-spacing:.05em}.seal{width:54px;height:54px;display:grid;place-items:center;border:3px double var(--red);color:var(--red);font-weight:900;line-height:1.1;transform:rotate(3deg);background:#a9322809}.status{text-align:right}.status span{font-size:12px;color:#766856}.status strong{display:block;color:var(--red);font-size:21px}.panel{position:relative;background:#fffaf0b8;border:1px solid #b3996e;border-radius:5px;padding:clamp(22px,4vw,42px);box-shadow:0 16px 45px #513a2130,inset 0 0 30px #9d7e4720}.panel:before,.panel:after{content:"";position:absolute;left:16px;right:16px;height:3px;border-block:1px solid #a9322855}.panel:before{top:10px}.panel:after{bottom:10px}.prompt{text-align:center}.prompt small{color:#8b745c;letter-spacing:.14em}.phrase{min-height:112px;display:flex;align-items:center;justify-content:center;gap:clamp(8px,2vw,17px);flex-wrap:wrap;margin:18px auto 25px;font-size:clamp(27px,5vw,46px);font-weight:900}.slot{position:relative;width:clamp(82px,14vw,130px);height:clamp(68px,12vw,100px);display:grid;place-items:center;color:#b64237;border:3px solid var(--red);background-color:#fffaf2;background-image:linear-gradient(45deg,transparent 49.3%,#b6423730 49.5%,#b6423730 50.5%,transparent 50.7%),linear-gradient(-45deg,transparent 49.3%,#b6423730 49.5%,#b6423730 50.5%,transparent 50.7%),linear-gradient(90deg,transparent 49.5%,#b6423725 49.7%,#b6423725 50.3%,transparent 50.5%),linear-gradient(0deg,transparent 49.5%,#b6423725 49.7%,#b6423725 50.3%,transparent 50.5%);transition:.2s}.slot:empty:after{content:"□";opacity:.25}.slot.hover{transform:scale(1.05);box-shadow:0 0 0 6px #c83d3030}.slot.correct{color:var(--red);font-weight:900;background-color:#fff7e7;animation:stamp .3s}.slot.wrong{animation:wrong .2s;box-shadow:0 0 18px #d43232}.cards-title{text-align:center;color:#806d56;font-size:13px;margin:4px 0 13px}.cards{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;min-height:176px}.card{touch-action:none;display:grid;place-items:center;min-height:58px;padding:8px;background-color:#ecd7a7;background-image:repeating-linear-gradient(2deg,transparent 0 8px,#9f774619 9px,transparent 10px);border:1px solid #a98451;border-radius:7px;color:#29231d;font:700 clamp(14px,2vw,19px) "Noto Serif TC",serif;box-shadow:0 4px 0 #a78355,0 7px 12px #4d38231c;cursor:grab;user-select:none;transition:transform .16s,opacity .16s}.card:hover{transform:translateY(-2px)}.card.used{opacity:.2;pointer-events:none}.card.bad{animation:wrong .2s}.ghost{position:fixed;z-index:99;pointer-events:none;transform:translate(-50%,-50%) rotate(2deg) scale(1.08);width:130px;min-height:58px;box-shadow:0 13px 28px #34241650}.result{text-align:center;min-height:90px;padding-top:19px;opacity:0;transform:translateY(8px);transition:.3s}.result.show{opacity:1;transform:none}.result h2{margin:0;color:var(--green);font-size:26px}.result p{margin:4px 0 13px;color:#6f5c47}.btn{border:1px solid #7b241f;border-radius:4px;background:var(--red);color:#fff6df;padding:9px 22px;font:700 15px "Noto Serif TC",serif;cursor:pointer;box-shadow:0 4px 0 #68221d}.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #68221d}.overlay{position:fixed;inset:0;z-index:20;display:grid;place-items:center;background:#30271fc9;backdrop-filter:blur(5px);opacity:0;visibility:hidden;transition:.3s}.overlay.show{opacity:1;visibility:visible}.modal{width:min(430px,calc(100% - 35px));text-align:center;background:var(--paper);padding:38px;border:8px double #9c3931;box-shadow:0 25px 80px #0006;transform:scale(.9);transition:.3s}.overlay.show .modal{transform:scale(1)}.modal .big{font-size:52px}.modal h2{font-size:32px;margin:3px}.modal p{color:#6f5c47}.modal strong{font-size:38px;color:var(--red)}@keyframes stamp{0%{transform:scale(1.5) rotate(-5deg);opacity:.2}100%{transform:none;opacity:1}}@keyframes wrong{25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}@media(max-width:700px){.cards{grid-template-columns:repeat(3,1fr)}.panel{padding-inline:16px}.phrase{gap:7px}.app{width:min(100% - 16px,1060px)}}
</style><style>.map-back{position:fixed;z-index:9999;left:14px;top:14px;padding:9px 14px;border:2px solid #ffffff55;border-radius:99px;background:#10172ddd;color:#fff;text-decoration:none;font:800 14px "Microsoft JhengHei",sans-serif;box-shadow:0 6px 18px #0005;backdrop-filter:blur(8px)}.map-back:hover{transform:translateY(-2px);background:#26365d}</style></head><body><a class="map-back" href="../大冒險地圖/map.html">← 回到大地圖</a>
<main class="app"><header><div class="brand"><small>ANIMAL SIMILES</small><h1>用動物一樣……</h1></div><div class="status"><span>本場進度</span><strong><b id="round">1</b> / 5</strong></div><div class="seal">英語<br>字帖</div></header><section class="panel"><div class="prompt"><small>將正確字卡拖入紅色米字格</small><div class="phrase" id="phrase"></div></div><div class="cards-title">— 字卡十五枚・其中二枚為正解 —</div><div class="cards" id="cards"></div><div class="result" id="result"><h2>✓ 答對！</h2><p id="meaning"></p><button class="btn" id="next">下一題 →</button></div></section></main>
<div class="overlay" id="finish"><div class="modal"><div class="big">🏮</div><h2>闖關完成</h2><p>五題皆已完成，你的總成績是</p><strong id="score">0 / 5</strong><p>Practice makes perfect!</p><button class="btn" id="again">重新挑戰</button></div></div>
<script>
const QUESTIONS=[
 {成語:'quick as a cricket',缺字:[0,3],答案:['quick','cricket'],意思:'像蟋蟀一樣敏捷、快速'},
 {成語:'strong as an ox',缺字:[0,3],答案:['strong','ox'],意思:'像牛一樣強壯'},
 {成語:'busy as a bee',缺字:[0,3],答案:['busy','bee'],意思:'像蜜蜂一樣忙碌'},
 {成語:'wise as an owl',缺字:[0,3],答案:['wise','owl'],意思:'像貓頭鷹一樣有智慧'},
 {成語:'brave as a lion',缺字:[0,3],答案:['brave','lion'],意思:'像獅子一樣勇敢'},
 {成語:'quiet as a mouse',缺字:[0,3],答案:['quiet','mouse'],意思:'像老鼠一樣安靜'},
 {成語:'free as a bird',缺字:[0,3],答案:['free','bird'],意思:'像鳥兒一樣自由'},
 {成語:'gentle as a lamb',缺字:[0,3],答案:['gentle','lamb'],意思:'像小羊一樣溫順'},
 {成語:'proud as a peacock',缺字:[0,3],答案:['proud','peacock'],意思:'像孔雀一樣驕傲'},
 {成語:'slow as a snail',缺字:[0,3],答案:['slow','snail'],意思:'像蝸牛一樣緩慢'},
 {成語:'sly as a fox',缺字:[0,3],答案:['sly','fox'],意思:'像狐狸一樣狡猾'},
 {成語:'hungry as a wolf',缺字:[0,3],答案:['hungry','wolf'],意思:'像狼一樣飢餓'},
 {成語:'stubborn as a mule',缺字:[0,3],答案:['stubborn','mule'],意思:'像騾子一樣固執'},
 {成語:'playful as a kitten',缺字:[0,3],答案:['playful','kitten'],意思:'像小貓一樣愛玩'},
 {成語:'graceful as a swan',缺字:[0,3],答案:['graceful','swan'],意思:'像天鵝一樣優雅'}
];
const DISTRACTORS=['fast','tiny','clever','tall','happy','cold','rabbit','tiger','bear','duck','horse','cat','eagle','fish','ant','deer','turtle','monkey','goat','frog','shark','dog'];
const phraseEl=document.querySelector('#phrase'),cardsEl=document.querySelector('#cards'),resultEl=document.querySelector('#result'),meaningEl=document.querySelector('#meaning'),roundEl=document.querySelector('#round');let game=[],round=0,filled=0,drag=null,ghost=null;
const shuffle=a=>[...a].sort(()=>Math.random()-.5);
function newGame(){game=shuffle(QUESTIONS).slice(0,5);round=0;document.querySelector('#finish').classList.remove('show');showQuestion()}
function showQuestion(){filled=0;resultEl.classList.remove('show');roundEl.textContent=round+1;const q=game[round],words=q.成語.split(' ');phraseEl.innerHTML=words.map((w,i)=>q.缺字.includes(i)?`<span class="slot" data-answer="${q.答案[q.缺字.indexOf(i)]}"></span>`:`<span>${w}</span>`).join('');const pool=shuffle([...q.答案,...shuffle(DISTRACTORS.filter(x=>!q.答案.includes(x))).slice(0,13)]);cardsEl.innerHTML=pool.map(w=>`<div class="card" data-word="${w}">${w}</div>`).join('');document.querySelectorAll('.card').forEach(c=>c.addEventListener('pointerdown',startDrag))}
function startDrag(e){e.preventDefault();drag=e.currentTarget;drag.setPointerCapture(e.pointerId);ghost=drag.cloneNode(true);ghost.classList.add('ghost');document.body.appendChild(ghost);moveGhost(e);drag.style.opacity='.25';drag.addEventListener('pointermove',moveGhost);drag.addEventListener('pointerup',drop);drag.addEventListener('pointercancel',drop)}
function moveGhost(e){if(!ghost)return;ghost.style.left=e.clientX+'px';ghost.style.top=e.clientY+'px';document.querySelectorAll('.slot').forEach(s=>s.classList.remove('hover'));const el=document.elementFromPoint(e.clientX,e.clientY),slot=el?.closest('.slot');if(slot&&!slot.classList.contains('correct'))slot.classList.add('hover')}
function drop(e){if(!drag)return;const card=drag,word=card.dataset.word;card.style.opacity='';card.releasePointerCapture?.(e.pointerId);card.removeEventListener('pointermove',moveGhost);card.removeEventListener('pointerup',drop);ghost?.remove();ghost=null;document.querySelectorAll('.slot').forEach(s=>s.classList.remove('hover'));const el=document.elementFromPoint(e.clientX,e.clientY),slot=el?.closest('.slot');if(slot&&!slot.classList.contains('correct')){if(slot.dataset.answer===word){slot.textContent=word;slot.classList.add('correct');card.classList.add('used');filled++;chime();if(filled===2){meaningEl.textContent=game[round].意思;setTimeout(()=>resultEl.classList.add('show'),300)}}else{card.classList.add('bad');setTimeout(()=>card.classList.remove('bad'),220);slot.classList.add('wrong');setTimeout(()=>slot.classList.remove('wrong'),220)}}drag=null}
function chime(){const a=chime.ctx??=new(window.AudioContext||window.webkitAudioContext)(),o=a.createOscillator(),g=a.createGain(),t=a.currentTime;o.type='sine';o.frequency.setValueAtTime(660,t);o.frequency.exponentialRampToValueAtTime(1040,t+.14);g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.connect(g);g.connect(a.destination);o.start(t);o.stop(t+.26)}
document.querySelector('#next').onclick=()=>{round++;if(round<5)showQuestion();else{localStorage.setItem('cert_idiom','1');document.cookie='cert_idiom=1; path=/; max-age=31536000; SameSite=Lax';document.querySelector('.map-back').href='../大冒險地圖/map.html?award=cert_idiom';document.querySelector('#score').textContent='5 / 5';document.querySelector('#finish').classList.add('show')}};document.querySelector('#again').onclick=newGame;newGame();
</script></body></html>
