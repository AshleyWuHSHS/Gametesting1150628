<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Count It! 可數・不可數名詞</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&family=Noto+Sans+TC:wght@500;700;900&display=swap');
    :root{--navy:#16213b;--cream:#fffaf0;--blue:#6699f4;--pink:#f0839a;--green:#5fc9a2;--yellow:#ffd56a;--ink:#26334d;--muted:#7c879d;--line:#e8dfd1}
    *{box-sizing:border-box}body{margin:0;min-height:100vh;color:var(--ink);font-family:Nunito,"Noto Sans TC",sans-serif;background-color:#f4eadb;background-image:radial-gradient(#d4c6b1 1px,transparent 1px);background-size:22px 22px}.app{width:min(1180px,calc(100% - 32px));margin:auto;padding:28px 0 40px}
    header{display:flex;align-items:center;justify-content:space-between;gap:20px;margin-bottom:22px}.brand small{display:block;color:var(--pink);font-size:11px;font-weight:900;letter-spacing:.18em}.brand h1{margin:1px 0;font-size:clamp(27px,4vw,43px);line-height:1}.brand h1 span{color:var(--blue)}.stats{display:flex;gap:10px}.pill{min-width:92px;padding:9px 16px;text-align:center;background:#fff;border:2px solid var(--line);border-radius:18px;box-shadow:0 5px 0 #d9ccba}.pill span{display:block;color:var(--muted);font-size:10px;font-weight:900;letter-spacing:.1em}.pill strong{font-size:22px;line-height:1}.progress{height:9px;background:#e0d4c4;border-radius:99px;overflow:hidden;margin-bottom:20px}.progress i{display:block;width:0;height:100%;border-radius:inherit;background:linear-gradient(90deg,var(--blue),var(--pink));transition:width .35s}
    .board{display:grid;grid-template-columns:320px 1fr;gap:20px}.deck,.play{background:#fffdf8;border:2px solid #fff;border-radius:28px;box-shadow:0 14px 38px #604b3030,0 5px 0 #d8c9b4;padding:22px}.deck-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}.deck h2{margin:0;font-size:17px}.deck-head span{font-size:12px;color:var(--muted)}.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-height:610px;overflow:auto;padding:2px 5px 5px 2px}.card{position:relative;min-height:88px;display:grid;place-items:center;padding:10px 6px;background:var(--cream);border:2px solid #eee3d3;border-radius:17px;cursor:grab;user-select:none;transition:.18s;box-shadow:0 4px 0 #ded2c0}.card:hover,.card.selected{transform:translateY(-3px) rotate(-1deg);border-color:var(--yellow);box-shadow:0 7px 0 #e3bd58}.card.dragging{opacity:.35}.card .icon{font-size:29px;line-height:1}.card b{font-size:14px}.card.done{animation:fly .35s forwards;pointer-events:none}.play{display:grid;grid-template-rows:auto 1fr auto;min-height:600px}.instruction{text-align:center;margin:3px 0 18px}.instruction h2{font-size:clamp(22px,3vw,31px);margin:0}.instruction p{color:var(--muted);margin:4px 0;font-size:14px}.zones{display:grid;grid-template-columns:1fr 1fr;gap:16px}.zone{position:relative;min-height:390px;padding:21px;border:3px dashed #b8cbef;background:#eff5ff;border-radius:24px;transition:.2s}.zone[data-id="2"]{border-color:#edbdc7;background:#fff0f3}.zone.over{transform:scale(1.015);border-style:solid;box-shadow:0 0 0 5px #ffd56a55}.zone h3{margin:0;text-align:center;font-size:25px}.zone h3 small{display:block;color:var(--muted);font-size:12px}.answer-list{display:flex;flex-wrap:wrap;align-content:flex-start;justify-content:center;gap:8px;margin-top:20px}.answer{display:flex;align-items:center;gap:5px;padding:7px 10px;background:#fff;border-radius:12px;border:1px solid #dbe5fa;box-shadow:0 3px 0 #cfdaef;font-size:13px;animation:pop .25s}.zone[data-id="2"] .answer{border-color:#f3d5dc;box-shadow:0 3px 0 #eacbd2}.tip{text-align:center;color:var(--muted);font-size:13px;margin-top:17px}.tip button{border:0;background:none;color:#7285a7;font:800 13px inherit;text-decoration:underline;cursor:pointer}
    .toast{position:fixed;left:50%;bottom:28px;z-index:5;transform:translate(-50%,30px);opacity:0;padding:12px 22px;border-radius:99px;background:var(--navy);color:#fff;font-weight:900;box-shadow:0 13px 35px #10192c55;pointer-events:none;transition:.25s}.toast.show{transform:translate(-50%,0);opacity:1}.toast.good{background:#258968}.toast.bad{background:#c95569}.finish{position:fixed;inset:0;z-index:10;display:grid;place-items:center;background:#18223ac7;backdrop-filter:blur(7px);opacity:0;visibility:hidden;transition:.3s}.finish.show{opacity:1;visibility:visible}.modal{width:min(420px,calc(100% - 36px));text-align:center;background:#fffdf8;border-radius:30px;padding:35px;box-shadow:0 25px 80px #0a102866;transform:scale(.88);transition:.3s}.finish.show .modal{transform:scale(1)}.trophy{font-size:62px}.modal h2{font-size:34px;margin:5px 0}.modal p{color:var(--muted)}.modal strong{color:var(--pink);font-size:28px}.primary{border:0;border-radius:99px;background:var(--blue);color:#fff;padding:12px 25px;font:900 15px inherit;cursor:pointer;box-shadow:0 6px 0 #4778d2}.primary:active{transform:translateY(4px);box-shadow:0 2px 0 #4778d2}@keyframes pop{from{transform:scale(.7);opacity:0}}@keyframes fly{to{transform:scale(.4);opacity:0}}@media(max-width:850px){.board{grid-template-columns:1fr}.cards{grid-template-columns:repeat(4,1fr);max-height:none}.play{min-height:580px}}@media(max-width:560px){header{align-items:flex-start}.stats{gap:5px}.pill{min-width:70px;padding:7px}.cards{grid-template-columns:repeat(3,1fr)}.zones{grid-template-columns:1fr}.zone{min-height:245px}.play{min-height:auto}.app{width:min(100% - 20px,1180px)}}
  </style>
<style>.map-back{position:fixed;z-index:9999;left:14px;top:14px;padding:9px 14px;border:2px solid #ffffff55;border-radius:99px;background:#10172ddd;color:#fff;text-decoration:none;font:800 14px "Microsoft JhengHei",sans-serif;box-shadow:0 6px 18px #0005;backdrop-filter:blur(8px)}.map-back:hover{transform:translateY(-2px);background:#26365d}</style></head>
<body><a class="map-back" href="../大冒險地圖/map.html">← 回到大地圖</a>
  <main class="app"><header><div class="brand"><small>ENGLISH CHALLENGE</small><h1><span>Count</span> It!</h1></div><div class="stats"><div class="pill"><span>SCORE</span><strong id="score">0</strong></div><div class="pill"><span>PROGRESS</span><strong><b id="done">0</b>/<b id="total">0</b></strong></div></div></header><div class="progress"><i id="bar"></i></div>
    <section class="board"><aside class="deck"><div class="deck-head"><h2>🃏 Word Cards</h2><span>拖曳或點選</span></div><div class="cards" id="cards"></div></aside><section class="play"><div class="instruction"><h2>Which group does it belong to?</h2><p>把每張單字卡放進正確的分類</p></div><div class="zones" id="zones"></div><div class="tip">💡 可先點單字卡，再點分類　<button id="reset">重新洗牌</button></div></section></section>
  </main><div class="toast" id="toast"></div><div class="finish" id="finish"><div class="modal"><div class="trophy">🏆</div><h2>Great job!</h2><p>你完成了所有分類，本次得分</p><strong id="final">0</strong><p id="remark"></p><button class="primary" id="again">再玩一次</button></div></div>
  <script>
    const categories=[{id:1,name:'可數',en:'Countable'},{id:2,name:'不可數',en:'Uncountable'}];
    const items=[
      {name:'apple',icon:'🍎',category_id:1},{name:'book',icon:'📘',category_id:1},{name:'chair',icon:'🪑',category_id:1},{name:'student',icon:'🧑‍🎓',category_id:1},{name:'egg',icon:'🥚',category_id:1},{name:'camera',icon:'📷',category_id:1},{name:'dog',icon:'🐕',category_id:1},{name:'idea',icon:'💡',category_id:1},{name:'coin',icon:'🪙',category_id:1},{name:'banana',icon:'🍌',category_id:1},
      {name:'water',icon:'💧',category_id:2},{name:'rice',icon:'🍚',category_id:2},{name:'milk',icon:'🥛',category_id:2},{name:'bread',icon:'🍞',category_id:2},{name:'sugar',icon:'🧂',category_id:2},{name:'homework',icon:'📝',category_id:2},{name:'information',icon:'ℹ️',category_id:2},{name:'music',icon:'🎵',category_id:2},{name:'money',icon:'💵',category_id:2},{name:'weather',icon:'🌦️',category_id:2}
    ];
    const cardsEl=document.querySelector('#cards'),zonesEl=document.querySelector('#zones'),scoreEl=document.querySelector('#score'),doneEl=document.querySelector('#done'),totalEl=document.querySelector('#total'),bar=document.querySelector('#bar'),toast=document.querySelector('#toast'),finish=document.querySelector('#finish');let score=0,done=0,selected=null,toastTimer;
    const shuffle=a=>[...a].sort(()=>Math.random()-.5);
    function start(){score=done=0;selected=null;scoreEl.textContent=0;doneEl.textContent=0;totalEl.textContent=items.length;bar.style.width='0%';finish.classList.remove('show');zonesEl.innerHTML=categories.map(c=>`<div class="zone" data-id="${c.id}"><h3>${c.en}<small>${c.name}名詞</small></h3><div class="answer-list"></div></div>`).join('');cardsEl.innerHTML=shuffle(items).map((x,i)=>`<div class="card" draggable="true" data-index="${items.indexOf(x)}"><span class="icon">${x.icon}</span><b>${x.name}</b></div>`).join('');bind()}
    function bind(){document.querySelectorAll('.card').forEach(card=>{card.addEventListener('dragstart',e=>{selected=card;card.classList.add('dragging');e.dataTransfer.setData('text/plain',card.dataset.index)});card.addEventListener('dragend',()=>card.classList.remove('dragging'));card.addEventListener('click',()=>{document.querySelectorAll('.card').forEach(x=>x.classList.remove('selected'));selected=card;card.classList.add('selected');show('已選取，請點右邊的分類','good')})});document.querySelectorAll('.zone').forEach(zone=>{zone.addEventListener('dragover',e=>{e.preventDefault();zone.classList.add('over')});zone.addEventListener('dragleave',()=>zone.classList.remove('over'));zone.addEventListener('drop',e=>{e.preventDefault();zone.classList.remove('over');const card=document.querySelector(`.card[data-index="${e.dataTransfer.getData('text/plain')}"]`);check(card,zone)});zone.addEventListener('click',()=>{if(selected)check(selected,zone)})})}
    function check(card,zone){if(!card||card.classList.contains('done'))return;const item=items[+card.dataset.index],target=+zone.dataset.id;if(item.category_id===target){score+=10;done++;scoreEl.textContent=score;doneEl.textContent=done;bar.style.width=`${done/items.length*100}%`;zone.querySelector('.answer-list').insertAdjacentHTML('beforeend',`<span class="answer">${item.icon} ${item.name}</span>`);card.classList.add('done');selected=null;show('Correct! +10 ✨','good');setTimeout(()=>card.remove(),350);if(done===items.length)setTimeout(end,650)}else{score=Math.max(0,score-2);scoreEl.textContent=score;card.classList.remove('selected');selected=null;show('Try again! 再想想看','bad');card.animate([{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(0)'}],{duration:220})}}
    function show(text,type){clearTimeout(toastTimer);toast.textContent=text;toast.className=`toast show ${type}`;toastTimer=setTimeout(()=>toast.className='toast',1200)}function end(){localStorage.setItem('cert_dynasty','1');document.cookie='cert_dynasty=1; path=/; max-age=31536000; SameSite=Lax';document.querySelector('.map-back').href='../大冒險地圖/map.html?award=cert_dynasty';document.querySelector('#final').textContent=score;document.querySelector('#remark').textContent=score===items.length*10?'Perfect score! 全部答對！':'Keep practicing—you’re doing great!';finish.classList.add('show')}
    document.querySelector('#reset').addEventListener('click',start);document.querySelector('#again').addEventListener('click',start);start();
  </script>
</body></html>
